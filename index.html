  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0.13);\n      --violet-glow:rgba(107,159,255,0.07);\n      --teal:       #f0a030;          /* amber — distinct from blue for all CVD */\n      --teal-dim:   rgba(240,160,48,0.12);\n      --text:       #edf0fa;          /* boosted from #d4daf0 */\n      --text-dim:   #a8b4d4;          /* boosted from #7a85a8 — now ≥4.5:1 */\n      --text-muted: #7080a8;          /* boosted from #3e4a68 — now readable */\n      --mono:       'JetBrains Mono', monospace;\n      --sans:       'DM Sans', system-ui, sans-serif;\n      --disp:       'Space Grotesk', system-ui, sans-serif;\n    }\n\n    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }\n\n    /* dot grid */\n    body::before {\n      content: '';\n      position: fixed; inset: 0;\n      background-image: radial-gradient(circle, rgba(124,108,255,0.18) 1px, transparent 1px);\n      background-size: 28px 28px;\n      pointer-events: none;\n      z-index: 0;\n      mask-image: radial-gradient(ellipse at 60% 40%, rgba(0,0,0,0.6) 0%, transparent 75%);\n    }\n\n    /* ambient */\n    body::after {\n      content: '';\n      position: fixed; inset: 0;\n      background:\n        radial-gradient(ellipse 700px 500px at 70% 20%, rgba(124,108,255,0.06) 0%, transparent 70%),\n        radial-gradient(ellipse 500px 400px at 20% 80%, rgba(45,212,191,0.05) 0%, transparent 70%);\n      pointer-events: none;\n      z-index: 0;\n    }\n\n    .app {\n      display: grid;\n      grid-template-columns: 300px 1fr;\n      height: 100vh;\n      position: relative;\n      z-index: 1;\n    }\n\n    /* ── sidebar ── */\n    .sidebar {\n      background: var(--surface);\n      border-right: 1px solid var(--border);\n      display: flex;\n      flex-direction: column;\n      overflow: hidden;\n    }\n\n    /* identity block */\n    .identity {\n      padding: 28px 24px 22px;\n      border-bottom: 1px solid var(--border);\n      position: relative;\n    }\n\n    .identity::after {\n      content: '';\n      position: absolute;\n      bottom: -1px; left: 24px; right: 24px;\n      height: 1px;\n    }\n\n    .id-chip {\n      display: inline-flex;\n      align-items: center;\n      gap: 6px;\n      font-family: var(--mono);\n      font-size: 10px;\n      color: var(--violet);\n      background: var(--violet-dim);\n      border: 1px solid rgba(124,108,255,0.25);\n      padding: 3px 8px;\n      border-radius: 4px;\n      margin-bottom: 14px;\n      letter-spacing: 0.5px;\n    }\n\n    .id-dot {\n      width: 5px; height: 5px;\n      border-radius: 50%;\n      background: var(--violet);\n      box-shadow: 0 0 5px var(--violet);\n      animation: idpulse 2.4s ease-in-out infinite;\n    }\n\n    @keyframes idpulse { 0%,100%{opacity:1} 50%{opacity:0.3} }\n\n    .id-avatar {\n      width: 52px; height: 52px;\n      border-radius: 14px;\n      background: linear-gradient(135deg, #1a2560 0%, #0d1221 100%);\n      border: 1px solid rgba(124,108,255,0.3);\n      display: flex; align-items: center; justify-content: center;\n      font-family: var(--disp);\n      font-size: 18px; font-weight: 700;\n      color: var(--violet);\n      margin-bottom: 12px;\n      box-shadow: 0 0 20px rgba(124,108,255,0.1);\n    }\n\n    .id-name {\n      font-family: var(--disp);\n      font-size: 20px;\n      font-weight: 700;\n      color: #fff;\n      letter-spacing: -0.3px;\n      line-height: 1.2;\n    }\n\n    .id-role {\n      font-family: var(--mono);\n      font-size: 10.5px;\n      color: var(--teal);\n      margin-top: 4px;\n      letter-spacing: 0.5px;\n    }\n\n    /* data sections */\n    .sb-scroll {\n      flex: 1;\n      overflow-y: auto;\n      scrollbar-width: none;\n      padding: 4px 0;\n    }\n    .sb-scroll::-webkit-scrollbar { display: none; }\n\n    .sb-block {\n      padding: 16px 24px;\n      border-bottom: 1px solid var(--border);\n    }\n\n    .sb-head {\n      display: flex;\n      align-items: center;\n      gap: 6px;\n      margin-bottom: 12px;\n    }\n\n    .sb-head-label {\n      font-family: var(--mono);\n      font-size: 9.5px;\n      text-transform: uppercase;\n      letter-spacing: 1.8px;\n      color: var(--text-muted);\n      font-weight: 500;\n    }\n\n    .sb-head-line {\n      flex: 1;\n      height: 1px;\n      background: var(--border);\n    }\n\n    /* stat row */\n    .stat-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 8px;\n    }\n\n    .stat-card {\n      background: var(--surface2);\n      border: 1px solid var(--border);\n      border-radius: 10px;\n      padding: 12px;\n      transition: border-color 0.2s;\n    }\n\n    .stat-card:hover { border-color: rgba(124,108,255,0.3); }\n\n    .stat-val {\n      font-family: var(--disp);\n      font-size: 22px;\n      font-weight: 700;\n      color: #fff;\n      line-height: 1;\n    }\n\n    .stat-val small {\n      font-size: 13px;\n      color: var(--violet);\n      font-weight: 500;\n    }\n\n    .stat-lbl {\n      font-family: var(--mono);\n      font-size: 9.5px;\n      color: var(--text-muted);\n      text-transform: uppercase;\n      letter-spacing: 1px;\n      margin-top: 5px;\n    }\n\n    /* skill bars */\n    .skills { display: flex; flex-direction: column; gap: 10px; }\n\n    .skill-row {\n      display: flex;\n      align-items: center;\n      gap: 10px;\n    }\n\n    .skill-name {\n      font-size: 12.5px;\n      color: var(--text-dim);\n      width: 118px;\n      flex-shrink: 0;\n    }\n\n    .skill-track {\n      flex: 1;\n      height: 3px;\n      background: var(--surface3);\n      border-radius: 2px;\n      overflow: hidden;\n    }\n\n    .skill-fill {\n      height: 100%;\n      border-radius: 2px;\n      background: linear-gradient(90deg, var(--violet), var(--teal));\n      transition: width 1.1s cubic-bezier(0.16,1,0.3,1);\n      width: 0;\n    }\n\n    .skill-pct {\n      font-family: var(--mono);\n      font-size: 10px;\n      color: var(--text-muted);\n      width: 26px;\n      text-align: right;\n    }\n\n    /* tags */\n    .tags { display: flex; flex-wrap: wrap; gap: 5px; }\n\n    .tag {\n      font-family: var(--mono);\n      font-size: 10.5px;\n      padding: 4px 9px;\n      border-radius: 5px;\n      border: 1px solid var(--border2);\n      color: var(--text-dim);\n      letter-spacing: 0.2px;\n    }\n\n    .tag.v {\n      background: var(--violet-dim);\n      border-color: rgba(124,108,255,0.28);\n      color: #a89fff;\n    }\n\n    .tag.t {\n      background: var(--teal-dim);\n      border-color: rgba(45,212,191,0.25);\n      color: var(--teal);\n    }\n\n    /* sidebar footer */\n    .sb-footer {\n      padding: 16px 24px;\n      font-size: 11.5px;\n      color: var(--text-dim);\n      line-height: 1.6;\n      font-family: var(--mono);\n    }\n\n    /* ── chat ── */\n    .chat {\n      display: flex;\n      flex-direction: column;\n      min-height: 0;\n    }\n\n    .chat-header {\n      padding: 22px 32px 18px;\n      border-bottom: 1px solid var(--border);\n      flex-shrink: 0;\n      display: flex;\n      align-items: flex-end;\n      justify-content: space-between;\n      gap: 20px;\n    }\n\n    .chat-header-left h1 {\n      font-family: var(--disp);\n      font-size: 22px;\n      font-weight: 700;\n      color: #fff;\n      letter-spacing: -0.3px;\n    }\n\n    .chat-header-left h1 em {\n      font-style: normal;\n      color: var(--violet);\n    }\n\n    .chat-header-left p {\n      margin-top: 4px;\n      font-size: 14px;\n      color: var(--text-dim);\n    }\n\n    .model-badge {\n      display: flex;\n      align-items: center;\n      gap: 6px;\n      font-family: var(--mono);\n      font-size: 10px;\n      color: var(--text-muted);\n      background: var(--surface2);\n      border: 1px solid var(--border);\n      padding: 6px 10px;\n      border-radius: 8px;\n      white-space: nowrap;\n      flex-shrink: 0;\n    }\n\n    .model-badge-dot {\n      width: 5px; height: 5px;\n      border-radius: 50%;\n      background: var(--teal);\n      box-shadow: 0 0 5px var(--teal);\n    }\n\n    /* messages */\n    #messages {\n      flex: 1;\n      overflow-y: auto;\n      padding: 24px 32px;\n      display: flex;\n      flex-direction: column;\n      gap: 22px;\n      scrollbar-width: thin;\n      scrollbar-color: var(--surface3) transparent;\n    }\n\n    #messages::-webkit-scrollbar { width: 3px; }\n    #messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }\n\n    .msg {\n      display: flex;\n      gap: 13px;\n      animation: msgIn 0.22s cubic-bezier(0.16,1,0.3,1) both;\n    }\n\n    @keyframes msgIn {\n      from { opacity: 0; transform: translateY(6px); }\n      to   { opacity: 1; transform: translateY(0); }\n    }\n\n    .msg.user { flex-direction: row-reverse; }\n\n    .msg-avatar {\n      width: 32px; height: 32px;\n      border-radius: 9px;\n      flex-shrink: 0;\n      display: flex; align-items: center; justify-content: center;\n      font-family: var(--mono);\n      font-size: 10px;\n      font-weight: 500;\n      margin-top: 1px;\n    }\n\n    .msg.bot .msg-avatar {\n      background: linear-gradient(135deg, #1a2560, #0d1221);\n      border: 1px solid rgba(124,108,255,0.3);\n      color: var(--violet);\n    }\n\n    .msg.user .msg-avatar {\n      background: var(--surface2);\n      border: 1px solid var(--border2);\n      color: var(--text-dim);\n    }\n\n    .msg-content { max-width: min(600px, calc(100% - 56px)); }\n\n    .msg-meta-line {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n      margin-bottom: 6px;\n    }\n\n    .msg.user .msg-meta-line { flex-direction: row-reverse; }\n\n    .msg-sender {\n      font-family: var(--mono);\n      font-size: 10px;\n      font-weight: 500;\n      letter-spacing: 0.3px;\n    }\n\n    .msg.bot  .msg-sender { color: var(--violet); }\n    .msg.user .msg-sender { color: var(--teal); }\n\n    .msg-time {\n      font-family: var(--mono);\n      font-size: 10px;\n      color: var(--text-muted);\n    }\n\n    .msg-bubble {\n      padding: 13px 16px;\n      border-radius: 12px;\n      font-size: 14px;\n      line-height: 1.7;\n    }\n\n    .msg.bot .msg-bubble {\n      background: var(--surface);\n      border-top: 1px solid var(--border2);\n      border-right: 1px solid var(--border2);\n      border-bottom: 1px solid var(--border2);\n      border-left: 3px solid var(--violet);\n      border-top-left-radius: 3px;\n      color: var(--text);\n    }\n\n    .msg.user .msg-bubble {\n      background: var(--surface2);\n      border-top: 1px solid rgba(240,160,48,0.25);\n      border-left: 1px solid rgba(240,160,48,0.25);\n      border-bottom: 1px solid rgba(240,160,48,0.25);\n      border-right: 3px solid var(--teal);\n      border-top-right-radius: 3px;\n      color: var(--text);\n    }\n\n    .msg-bubble p + p { margin-top: 9px; }\n    .msg-bubble strong { color: #fff; font-weight: 600; }\n\n    /* typing */\n    .typing-dots {\n      display: inline-flex; gap: 4px; align-items: center;\n    }\n    .typing-dots span {\n      width: 5px; height: 5px; border-radius: 50%;\n      background: var(--violet); opacity: 0.6;\n      animation: tdot 1.2s infinite;\n    }\n    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }\n    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }\n    @keyframes tdot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px);opacity:1} }\n\n    /* starters */\n    .starters-area {\n      padding: 0 32px 14px;\n      flex-shrink: 0;\n    }\n\n    .starters-label {\n      font-family: var(--mono);\n      font-size: 9.5px;\n      text-transform: uppercase;\n      letter-spacing: 2px;\n      color: var(--text-muted);\n      margin-bottom: 8px;\n    }\n\n    .starters-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 7px;\n    }\n\n    .starter {\n      background: var(--surface);\n      border: 1px solid var(--border2);\n      color: var(--text-dim);\n      font-size: 12.5px;\n      font-family: var(--sans);\n      padding: 10px 14px;\n      border-radius: 9px;\n      cursor: pointer;\n      transition: border-color 0.15s, color 0.15s, background 0.15s;\n      text-align: left;\n      line-height: 1.4;\n    }\n\n    .starter:hover {\n      border-color: rgba(124,108,255,0.4);\n      color: var(--text);\n      background: var(--violet-glow);\n    }\n\n    /* input */\n    .input-wrap {\n      flex-shrink: 0;\n      padding: 0 32px 24px;\n    }\n\n    .input-box {\n      display: flex;\n      gap: 10px;\n      background: var(--surface);\n      border: 1px solid var(--border2);\n      border-radius: 13px;\n      padding: 12px 14px;\n      transition: border-color 0.2s, box-shadow 0.2s;\n    }\n\n    .input-box:focus-within {\n      border-color: rgba(124,108,255,0.5);\n      box-shadow: 0 0 0 3px rgba(124,108,255,0.07);\n    }\n\n    #userInput {\n      flex: 1;\n      background: none;\n      border: none; outline: none;\n      color: var(--text);\n      font-size: 14px;\n      font-family: var(--sans);\n      resize: none;\n      max-height: 130px;\n      line-height: 1.55;\n    }\n\n    #userInput::placeholder { color: var(--text-muted); }\n\n    #sendBtn {\n      align-self: flex-end;\n      width: 36px; height: 36px;\n      border-radius: 9px;\n      background: var(--violet);\n      border: none; cursor: pointer;\n      display: flex; align-items: center; justify-content: center;\n      flex-shrink: 0;\n      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;\n    }\n\n    #sendBtn:hover {\n      background: #89b5ff;\n      box-shadow: 0 4px 16px rgba(107,159,255,0.4);\n    }\n\n    #sendBtn:active { transform: scale(0.92); }\n    #sendBtn:disabled { background: var(--surface3); cursor: not-allowed; box-shadow: none; }\n\n    .hint {\n      font-family: var(--mono);\n      font-size: 10.5px;\n      color: var(--text-muted);\n      text-align: center;\n      margin-top: 8px;\n      letter-spacing: 0.3px;\n    }\n\n    /* responsive */\n    @media (max-width: 760px) {\n      .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }\n      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }\n      .stat-grid { grid-template-columns: repeat(4,1fr); }\n      .starters-grid { grid-template-columns: 1fr; }\n      .chat-header { flex-direction: column; align-items: flex-start; }\n      #messages { padding: 16px 20px; }\n      .starters-area, .input-wrap { padding-left: 20px; padding-right: 20px; }\n      .chat-header { padding: 18px 20px 14px; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"app\">\n\n  <!-- ── Sidebar ── -->\n  <aside class=\"sidebar\">\n    <div class=\"identity\">\n      <div class=\"id-chip\">\n        <div class=\"id-dot\"><\u002Fdiv>\n        career-intelligence · active\n      <\u002Fdiv>\n      <div class=\"id-avatar\">RM<\u002Fdiv>\n      <div class=\"id-name\">Rob McKinney<\u002Fdiv>\n      <div class=\"id-role\">CPO · COO · Executive Leader<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sb-scroll\">\n\n      <div class=\"sb-block\">\n        <div class=\"sb-head\">\n          <span class=\"sb-head-label\">profile<\u002Fspan>\n          <div class=\"sb-head-line\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-grid\">\n          <div class=\"stat-card\">\n            <div class=\"stat-val\">30<small>yr<\u002Fsmall><\u002Fdiv>\n            <div class=\"stat-lbl\">Experience<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"stat-card\">\n            <div class=\"stat-val\">F<small>150<\u002Fsmall><\u002Fdiv>\n            <div class=\"stat-lbl\">Corp Scale<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"stat-card\">\n            <div class=\"stat-val\" style=\"font-size:16px;padding-top:3px\">Denver<\u002Fdiv>\n            <div class=\"stat-lbl\">Colorado<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"stat-card\">\n            <div class=\"stat-val\" style=\"font-size:16px;padding-top:3px\">Navy<\u002Fdiv>\n            <div class=\"stat-lbl\">Veteran ⚓<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"sb-block\">\n        <div class=\"sb-head\">\n          <span class=\"sb-head-label\">skills<\u002Fspan>\n          <div class=\"sb-head-line\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"skills\">\n          <div class=\"skill-row\">\n            <span class=\"skill-name\">Product Strategy<\u002Fspan>\n            <div class=\"skill-track\"><div class=\"skill-fill\" data-pct=\"97\"><\u002Fdiv><\u002Fdiv>\n            <span class=\"skill-pct\">97<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"skill-row\">\n            <span class=\"skill-name\">Org Design<\u002Fspan>\n            <div class=\"skill-track\"><div class=\"skill-fill\" data-pct=\"94\"><\u002Fdiv><\u002Fdiv>\n            <span class=\"skill-pct\">94<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"skill-row\">\n            <span class=\"skill-name\">Tech Leadership<\u002Fspan>\n            <div class=\"skill-track\"><div class=\"skill-fill\" data-pct=\"90\"><\u002Fdiv><\u002Fdiv>\n            <span class=\"skill-pct\">90<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"skill-row\">\n            <span class=\"skill-name\">P&amp;L Ownership<\u002Fspan>\n            <div class=\"skill-track\"><div class=\"skill-fill\" data-pct=\"93\"><\u002Fdiv><\u002Fdiv>\n            <span class=\"skill-pct\">93<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"skill-row\">\n            <span class=\"skill-name\">Team Scaling<\u002Fspan>\n            <div class=\"skill-track\"><div class=\"skill-fill\" data-pct=\"91\"><\u002Fdiv><\u002Fdiv>\n            <span class=\"skill-pct\">91<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"sb-block\">\n        <div class=\"sb-head\">\n          <span class=\"sb-head-label\">domains<\u002Fspan>\n          <div class=\"sb-head-line\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tags\">\n          <span class=\"tag v\">CPO<\u002Fspan>\n          <span class=\"tag v\">COO<\u002Fspan>\n          <span class=\"tag t\">Healthcare<\u002Fspan>\n          <span class=\"tag t\">SaaS<\u002Fspan>\n          <span class=\"tag\">Startups<\u002Fspan>\n          <span class=\"tag\">Enterprise<\u002Fspan>\n          <span class=\"tag\">Regulated Mkts<\u002Fspan>\n          <span class=\"tag\">Cross-functional<\u002Fspan>\n          <span class=\"tag\">P&amp;L<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div class=\"sb-footer\">\n      // AI trained on Rob's full<br>career record · ask freely\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ── Chat ── -->\n  <div class=\"chat\">\n\n    <div class=\"chat-header\">\n      <div class=\"chat-header-left\">\n        <h1>Is Rob right for <em>your role?<\u002Fem><\u002Fh1>\n        <p>Paste a job description or describe what you're hiring for.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"model-badge\">\n        <div class=\"model-badge-dot\"><\u002Fdiv>\n        model · online\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"messages\"><\u002Fdiv>\n\n    <div class=\"starters-area\" id=\"startersWrap\">\n      <div class=\"starters-label\">// suggested<\u002Fdiv>\n      <div class=\"starters-grid\" id=\"starters\">\n        <button class=\"starter\">We're hiring a CPO at an early-stage startup<\u002Fbutton>\n        <button class=\"starter\">VP Product role at a healthcare company<\u002Fbutton>\n        <button class=\"starter\">Tell me about his leadership style<\u002Fbutton>\n        <button class=\"starter\">How does he handle technical teams?<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"input-wrap\">\n      <div class=\"input-box\">\n        <textarea id=\"userInput\" rows=\"1\" placeholder=\"Paste a job description or ask anything about Rob…\"><\u002Ftextarea>\n        <button id=\"sendBtn\" aria-label=\"Send\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\">\n            <path d=\"M14 8L2 2l2.5 6L2 14l12-6z\" fill=\"white\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"hint\">↵ send &nbsp;·&nbsp; ⇧↵ new line<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  const messagesEl   = document.getElementById('messages');\n  const inputEl      = document.getElementById('userInput');\n  const sendBtn      = document.getElementById('sendBtn');\n  const startersWrap = document.getElementById('startersWrap');\n  const history = [];\n  let isLoading = false;\n\n  // animate skills\n  window.addEventListener('load', () => {\n    setTimeout(() => {\n      document.querySelectorAll('.skill-fill').forEach(el => {\n        el.style.width = el.dataset.pct + '%';\n      });\n    }, 350);\n  });\n\n  function autoResize() {\n    inputEl.style.height = 'auto';\n    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';\n  }\n\n  function ts() {\n    return new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12: false });\n  }\n\n  function formatText(t) {\n    return t\n      .replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;')\n      .replace(/\\*\\*(.+?)\\*\\*/g,'<strong>$1<\u002Fstrong>')\n      .replace(/\\*(.+?)\\*/g,'<em>$1<\u002Fem>')\n      .replace(/\\n\\n/g,'<\u002Fp><p>')\n      .replace(/\\n/g,'<br>')\n      .replace(/^/,'<p>').replace(/$/,'<\u002Fp>');\n  }\n\n  function renderMessage(role, text) {\n    const msg = document.createElement('div');\n    msg.className = `msg ${role}`;\n\n    const avatar = document.createElement('div');\n    avatar.className = 'msg-avatar';\n    avatar.textContent = role === 'bot' ? 'RM' : 'You';\n\n    const content = document.createElement('div');\n    content.className = 'msg-content';\n\n    const meta = document.createElement('div');\n    meta.className = 'msg-meta-line';\n    meta.innerHTML = `<span class=\"msg-sender\">${role === 'bot' ? 'rob.ai' : 'you'}<\u002Fspan><span class=\"msg-time\">${ts()}<\u002Fspan>`;\n\n    const bubble = document.createElement('div');\n    bubble.className = 'msg-bubble';\n    bubble.innerHTML = formatText(text);\n\n    content.appendChild(meta);\n    content.appendChild(bubble);\n    msg.appendChild(avatar);\n    msg.appendChild(content);\n    messagesEl.appendChild(msg);\n    messagesEl.scrollTop = messagesEl.scrollHeight;\n    return msg;\n  }\n\n  function renderTyping() {\n    const msg = document.createElement('div');\n    msg.className = 'msg bot';\n    msg.id = 'typing';\n\n    const avatar = document.createElement('div');\n    avatar.className = 'msg-avatar';\n    avatar.textContent = 'RM';\n\n    const content = document.createElement('div');\n    content.className = 'msg-content';\n\n    const meta = document.createElement('div');\n    meta.className = 'msg-meta-line';\n    meta.innerHTML = `<span class=\"msg-sender\">rob.ai<\u002Fspan>`;\n\n    const bubble = document.createElement('div');\n    bubble.className = 'msg-bubble';\n    bubble.innerHTML = '<div class=\"typing-dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>';\n\n    content.appendChild(meta);\n    content.appendChild(bubble);\n    msg.appendChild(avatar);\n    msg.appendChild(content);\n    messagesEl.appendChild(msg);\n    messagesEl.scrollTop = messagesEl.scrollHeight;\n    return msg;\n  }\n\n  async function send(text) {\n    if (!text.trim() || isLoading) return;\n    startersWrap.style.display = 'none';\n    isLoading = true; sendBtn.disabled = true;\n    history.push({ role: 'user', content: text });\n    renderMessage('user', text);\n    inputEl.value = ''; autoResize();\n    const typing = renderTyping();\n    try {\n      const res = await fetch('/.netlify/functions/chat', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify({ messages: history }),\n      });\n      const data = await res.json();\n      typing.remove();\n      if (data.error) {\n        renderMessage('bot', 'Sorry, something went wrong. Please try again.');\n      } else {\n        history.push({ role: 'assistant', content: data.content });\n        renderMessage('bot', data.content);\n      }\n    } catch {\n      typing.remove();\n      renderMessage('bot', 'Network error — please check your connection.');\n    }\n    isLoading = false; sendBtn.disabled = false; inputEl.focus();\n  }\n\n  inputEl.addEventListener('input', autoResize);\n  inputEl.addEventListener('keydown', e => {\n    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(inputEl.value); }\n  });\n  sendBtn.addEventListener('click', () => send(inputEl.value));\n  document.querySelectorAll('.starter').forEach(b => b.addEventListener('click', () => send(b.textContent.trim())));\n\n  // greeting\n  (async () => {\n    const typing = renderTyping();\n    await new Promise(r => setTimeout(r, 850));\n    typing.remove();\n    const greeting = \"Hi there! I'm an AI trained on Rob McKinney's full career background — 30 years of product, technology, and operational leadership across startups, Fortune 150 companies, and healthcare.\\n\\nPaste a job description or tell me about the role you're hiring for, and I'll walk you through exactly why Rob could be the person you're looking for.\";\n    history.push({ role: 'assistant', content: greeting });\n    renderMessage('bot', greeting);\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
